services:
  frontend:
    build:
      context: ./brick-generator
      dockerfile: Dockerfile
      args:
        - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY}
    container_name: fabrick_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Shared persistent volume – Frontend serves /bricks/* via Nginx
      - bricks_data:/usr/share/nginx/html/bricks

  backend:
    build:
      context: ./fabrick-admin-panel
      dockerfile: Dockerfile
      args:
        - CORS_ORIGIN=${CORS_ORIGIN:-https://konfigurator.fabrick.sk}
    container_name: fabrick_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://konfigurator.fabrick.sk}
      # Bricks directory – points to the shared volume mount inside the container
      - BRICKS_PUBLIC_DIR=/app/public/bricks
      # Public URL prefix used to build texture preview URLs returned by the API
      - BRICKS_SERVE_URL=${BRICKS_SERVE_URL:-https://konfigurator.fabrick.sk/bricks}
    volumes:
      # Named volume – isolated /app/data dir; does NOT shadow /app/prisma/schema.prisma
      - backend_db:/app/data
      - ./fabrick-admin-panel/public/uploads:/app/public/uploads
      # Shared persistent volume – Backend reads/writes brick textures here
      - bricks_data:/app/public/bricks

# Named volumes – persist across container rebuilds
volumes:
  bricks_data:
  backend_db:
